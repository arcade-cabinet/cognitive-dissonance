<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Glass Sphere Shatter — Voronoi Fracture + Physics</title>
<style>
  * { margin: 0; padding: 0; }
  body { background: #0a0a1a; overflow: hidden; font-family: monospace; display: flex; align-items: center; justify-content: center; height: 100vh; }
  canvas { border-radius: 16px; cursor: pointer; }
  #info {
    position: fixed; top: 20px; left: 20px;
    color: #666; font-size: 11px; line-height: 1.6;
  }
  #instructions {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    color: #888; font-size: 13px; text-align: center;
    background: rgba(0,0,0,0.6); padding: 10px 20px; border-radius: 8px;
    border: 1px solid #333;
  }
</style>
</head>
<body>
<canvas id="c" width="800" height="600"></canvas>
<div id="info">
  <strong style="color:#a78bfa">GLASS SHATTER SEQUENCE</strong><br>
  Click sphere: crack pattern → shatter<br>
  Voronoi tessellation for shard generation<br>
  Physics: gravity + rotational velocity<br>
  Alpha fade over 1800ms lifetime<br>
  <br>
  <strong>Validates:</strong> ShatterSequence system<br>
  Glass sphere IOR 1.52 refraction
</div>
<div id="instructions">Click the sphere to crack it. Click again to shatter.</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;
const CX = W/2, CY = H/2, RADIUS = 150;

let state = 'intact'; // intact → cracked → shattered → reset
let shards = [];
let crackLines = [];
let clickPos = { x: CX, y: CY };

// Generate Voronoi-like crack pattern from impact point
function generateCracks(px, py) {
  crackLines = [];
  const numRays = 12 + Math.floor(Math.random() * 8);
  for (let i = 0; i < numRays; i++) {
    const angle = (i / numRays) * Math.PI * 2 + (Math.random() - 0.5) * 0.3;
    const length = RADIUS * (0.5 + Math.random() * 0.5);
    const points = [{ x: px, y: py }];
    let cx = px, cy = py;
    const segments = 4 + Math.floor(Math.random() * 4);
    for (let j = 1; j <= segments; j++) {
      const t = j / segments;
      const jitter = (Math.random() - 0.5) * 20;
      cx = px + Math.cos(angle + jitter * 0.02) * length * t;
      cy = py + Math.sin(angle + jitter * 0.02) * length * t;
      // Keep within sphere
      const dx = cx - CX, dy = cy - CY;
      if (Math.sqrt(dx*dx + dy*dy) > RADIUS) break;
      points.push({ x: cx, y: cy });
    }
    crackLines.push(points);
  }
  // Cross-connecting cracks
  for (let r = 0.3; r <= 0.9; r += 0.3) {
    const ringPoints = [];
    const ringR = RADIUS * r;
    const numP = 8 + Math.floor(Math.random() * 6);
    for (let i = 0; i < numP; i++) {
      const a = (i / numP) * Math.PI * 2;
      const jx = (Math.random() - 0.5) * 15;
      const jy = (Math.random() - 0.5) * 15;
      ringPoints.push({
        x: CX + Math.cos(a) * ringR + jx,
        y: CY + Math.sin(a) * ringR + jy
      });
    }
    ringPoints.push(ringPoints[0]);
    crackLines.push(ringPoints);
  }
}

// Generate shards from Voronoi-like tessellation
function generateShards(px, py) {
  shards = [];
  const numShards = 30 + Math.floor(Math.random() * 20);
  for (let i = 0; i < numShards; i++) {
    // Random position within sphere
    const angle = Math.random() * Math.PI * 2;
    const r = Math.random() * RADIUS;
    const sx = CX + Math.cos(angle) * r;
    const sy = CY + Math.sin(angle) * r;

    // Triangular shard shape
    const size = 8 + Math.random() * 25;
    const rot = Math.random() * Math.PI * 2;
    const verts = [];
    for (let v = 0; v < 3 + Math.floor(Math.random() * 2); v++) {
      const va = rot + (v / 3) * Math.PI * 2 + (Math.random() - 0.5) * 0.5;
      const vr = size * (0.5 + Math.random() * 0.5);
      verts.push({ x: Math.cos(va) * vr, y: Math.sin(va) * vr });
    }

    // Velocity: radial from click point
    const dx = sx - px, dy = sy - py;
    const dist = Math.sqrt(dx*dx + dy*dy) || 1;
    const force = (RADIUS - dist) / RADIUS;
    const speed = 3 + Math.random() * 8;

    shards.push({
      x: sx, y: sy,
      vx: (dx / dist) * speed * (0.5 + force),
      vy: (dy / dist) * speed * (0.5 + force) - 2,
      vr: (Math.random() - 0.5) * 8,
      rotation: rot,
      verts: verts,
      life: 1.0,
      // Glass color with slight blue tint
      hue: 240 + Math.random() * 40,
      sat: 20 + Math.random() * 30,
      light: 70 + Math.random() * 20,
    });
  }
}

// Draw glass sphere
function drawSphere() {
  // Outer glow
  const glow = ctx.createRadialGradient(CX, CY, RADIUS * 0.8, CX, CY, RADIUS * 1.3);
  glow.addColorStop(0, 'rgba(100, 140, 255, 0.1)');
  glow.addColorStop(1, 'rgba(100, 140, 255, 0)');
  ctx.fillStyle = glow;
  ctx.fillRect(0, 0, W, H);

  // Glass sphere body
  const grad = ctx.createRadialGradient(CX - 30, CY - 40, 10, CX, CY, RADIUS);
  grad.addColorStop(0, 'rgba(200, 220, 255, 0.4)');
  grad.addColorStop(0.5, 'rgba(150, 180, 230, 0.2)');
  grad.addColorStop(0.8, 'rgba(100, 140, 200, 0.15)');
  grad.addColorStop(1, 'rgba(80, 120, 180, 0.3)');

  ctx.beginPath();
  ctx.arc(CX, CY, RADIUS, 0, Math.PI * 2);
  ctx.fillStyle = grad;
  ctx.fill();

  // Fresnel rim — brighter at edges (IOR 1.52 glass)
  ctx.beginPath();
  ctx.arc(CX, CY, RADIUS, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(180, 210, 255, 0.5)';
  ctx.lineWidth = 3;
  ctx.stroke();

  // Specular highlight
  const specGrad = ctx.createRadialGradient(CX - 40, CY - 50, 5, CX - 40, CY - 50, 60);
  specGrad.addColorStop(0, 'rgba(255, 255, 255, 0.7)');
  specGrad.addColorStop(1, 'rgba(255, 255, 255, 0)');
  ctx.fillStyle = specGrad;
  ctx.beginPath();
  ctx.arc(CX - 40, CY - 50, 50, 0, Math.PI * 2);
  ctx.fill();

  // Caustic pattern inside
  const time = performance.now() / 1000;
  ctx.save();
  ctx.beginPath();
  ctx.arc(CX, CY, RADIUS - 5, 0, Math.PI * 2);
  ctx.clip();
  ctx.globalAlpha = 0.1;
  for (let i = 0; i < 6; i++) {
    const cx = CX + Math.sin(time * 0.5 + i) * 40;
    const cy = CY + Math.cos(time * 0.3 + i * 1.5) * 30;
    const cGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, 30);
    cGrad.addColorStop(0, 'rgba(255, 240, 220, 0.8)');
    cGrad.addColorStop(1, 'rgba(255, 240, 220, 0)');
    ctx.fillStyle = cGrad;
    ctx.fillRect(cx - 30, cy - 30, 60, 60);
  }
  ctx.restore();
}

// Draw crack overlay
function drawCracks() {
  ctx.save();
  ctx.beginPath();
  ctx.arc(CX, CY, RADIUS, 0, Math.PI * 2);
  ctx.clip();

  crackLines.forEach(line => {
    if (line.length < 2) return;
    ctx.beginPath();
    ctx.moveTo(line[0].x, line[0].y);
    for (let i = 1; i < line.length; i++) {
      ctx.lineTo(line[i].x, line[i].y);
    }
    ctx.strokeStyle = 'rgba(255, 255, 255, 0.6)';
    ctx.lineWidth = 1;
    ctx.stroke();

    // Subtle glow along crack
    ctx.strokeStyle = 'rgba(180, 200, 255, 0.2)';
    ctx.lineWidth = 4;
    ctx.stroke();
  });
  ctx.restore();
}

// Draw and animate shards
function drawShards(dt) {
  let anyAlive = false;
  shards.forEach(s => {
    if (s.life <= 0) return;
    anyAlive = true;

    // Physics
    s.x += s.vx;
    s.y += s.vy;
    s.vy += 0.15; // gravity
    s.rotation += s.vr * 0.02;
    s.life -= dt * 0.7;
    s.vx *= 0.99;
    s.vy *= 0.99;

    // Draw shard
    ctx.save();
    ctx.translate(s.x, s.y);
    ctx.rotate(s.rotation);
    ctx.globalAlpha = Math.max(0, s.life);

    ctx.beginPath();
    ctx.moveTo(s.verts[0].x, s.verts[0].y);
    for (let i = 1; i < s.verts.length; i++) {
      ctx.lineTo(s.verts[i].x, s.verts[i].y);
    }
    ctx.closePath();

    // Glass shard with refraction color
    const grad = ctx.createLinearGradient(-10, -10, 10, 10);
    grad.addColorStop(0, `hsla(${s.hue}, ${s.sat}%, ${s.light}%, ${s.life * 0.6})`);
    grad.addColorStop(1, `hsla(${s.hue + 20}, ${s.sat + 10}%, ${s.light - 10}%, ${s.life * 0.4})`);
    ctx.fillStyle = grad;
    ctx.fill();

    // Shard edge highlight (Fresnel)
    ctx.strokeStyle = `rgba(200, 220, 255, ${s.life * 0.5})`;
    ctx.lineWidth = 1;
    ctx.stroke();

    ctx.restore();
  });

  if (!anyAlive && state === 'shattered') {
    setTimeout(() => {
      state = 'intact';
      shards = [];
      crackLines = [];
      document.getElementById('instructions').textContent = 'Click the sphere to crack it. Click again to shatter.';
    }, 500);
  }
}

// Main render loop
let lastTime = performance.now();
function render() {
  const now = performance.now();
  const dt = (now - lastTime) / 1000;
  lastTime = now;

  ctx.clearRect(0, 0, W, H);

  // Background
  const bgGrad = ctx.createRadialGradient(CX, CY, 0, CX, CY, Math.max(W, H) * 0.7);
  bgGrad.addColorStop(0, '#12122a');
  bgGrad.addColorStop(1, '#0a0a1a');
  ctx.fillStyle = bgGrad;
  ctx.fillRect(0, 0, W, H);

  if (state === 'intact') {
    drawSphere();
  } else if (state === 'cracked') {
    drawSphere();
    drawCracks();
  } else if (state === 'shattered') {
    drawShards(dt);
  }

  requestAnimationFrame(render);
}

canvas.addEventListener('click', e => {
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;

  // Check if click is within sphere
  const dx = mx - CX, dy = my - CY;
  const dist = Math.sqrt(dx*dx + dy*dy);

  if (state === 'intact' && dist <= RADIUS) {
    clickPos = { x: mx, y: my };
    generateCracks(mx, my);
    state = 'cracked';
    document.getElementById('instructions').textContent = 'Click again to shatter!';
  } else if (state === 'cracked') {
    generateShards(clickPos.x, clickPos.y);
    state = 'shattered';
    document.getElementById('instructions').textContent = 'Shattering...';
  }
});

render();
</script>
</body>
</html>
