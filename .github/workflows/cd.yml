name: CD

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  # ── Build + Test ──
  build-and-test:
    name: Build + Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup

      - name: Unit Tests
        run: pnpm test

      - name: Build (standard)
        run: pnpm build

      - name: Install Playwright browsers
        run: pnpm exec playwright install chromium --with-deps

      - name: Run Browser Component Tests
        run: xvfb-run --auto-servernum pnpm test:browser
        env:
          CI: "true"

      - name: Run E2E (headed via xvfb)
        run: xvfb-run --auto-servernum pnpm exec playwright test --workers=1
        env:
          CI: "true"

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: e2e-reports
          path: |
            playwright-report/
            test-results/
          retention-days: 7

  # ── Deploy Web to GitHub Pages ──
  deploy-pages:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: [build-and-test]
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup

      - name: Build static export for GitHub Pages
        run: pnpm build
        env:
          GITHUB_PAGES: "true"

      - name: Add .nojekyll
        run: touch dist/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0

  # ── Build Android APK via Capacitor ──
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: [build-and-test]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Android SDK
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4.0.1

      - name: Build web static export
        run: pnpm build
        env:
          GITHUB_PAGES: "true"

      - name: Sync Capacitor (copy web → android/)
        run: pnpm exec cap sync android

      - name: Cache Gradle
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            android/.gradle
          key: gradle-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload Debug APK
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cognitive-dissonance-debug.apk
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 30
          if-no-files-found: error

      # ── Release-signed build path ──
      # Only fires when ANDROID_KEYSTORE_BASE64 secret is set. Until then,
      # the steps are skipped so PRs and forks don't fail on missing secrets.
      - name: Decode release keystore
        id: keystore
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          KS_PATH="$GITHUB_WORKSPACE/android/app/release.keystore"
          printf '%s' "$KEYSTORE_B64" | base64 -d > "$KS_PATH"
          # Sanity check — must be a non-trivial binary file.
          if [ ! -s "$KS_PATH" ] || [ "$(stat -c %s "$KS_PATH")" -lt 256 ]; then
            echo "Decoded keystore looks invalid (empty or too small)" >&2
            exit 1
          fi
          echo "path=$KS_PATH" >> "$GITHUB_OUTPUT"

      - name: Build Release APK (signed)
        if: ${{ steps.keystore.outputs.path != '' }}
        working-directory: android
        env:
          ANDROID_KEYSTORE_PATH: ${{ steps.keystore.outputs.path }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon

      - name: Verify Release APK signature
        if: ${{ steps.keystore.outputs.path != '' }}
        run: |
          set -euo pipefail
          BUILD_TOOLS_DIR=$(ls -d "$ANDROID_HOME"/build-tools/* | sort -V | tail -n1)
          APK=$(ls android/app/build/outputs/apk/release/*.apk | head -n1)
          echo "Verifying $APK with $BUILD_TOOLS_DIR/apksigner"
          "$BUILD_TOOLS_DIR/apksigner" verify --verbose "$APK"

      - name: Upload Release APK
        if: ${{ steps.keystore.outputs.path != '' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cognitive-dissonance-release.apk
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 90
          if-no-files-found: error

      - name: Cleanup keystore
        if: always() && steps.keystore.outputs.path != ''
        run: rm -f "${{ steps.keystore.outputs.path }}"

  # ── Build iOS IPA via Capacitor ──
  build-ios:
    name: Build iOS App (unsigned)
    runs-on: macos-15
    needs: [build-and-test]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup

      - name: Build web static export
        run: pnpm build
        env:
          GITHUB_PAGES: "true"

      - name: Sync Capacitor (copy web → ios/)
        run: pnpm exec cap sync ios

      - name: Build iOS (unsigned, for simulator)
        working-directory: ios/App
        run: |
          xcodebuild \
            -project App.xcodeproj \
            -scheme App \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Upload iOS build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: ios-build-debug
          path: ios/App/build/Build/Products/**/*.app
          retention-days: 30
          if-no-files-found: warn
