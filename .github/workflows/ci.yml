name: CI

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

on:
  pull_request:

permissions:
  contents: read

jobs:
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup

      - name: Lint
        run: pnpm lint

      - name: Type Check
        run: pnpm exec tsc --noEmit

      - name: Unit Tests
        run: pnpm test

      - name: Build
        run: pnpm build

  e2e-smoke:
    name: Browser + E2E Tests
    runs-on: ubuntu-latest
    needs: [code-quality]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup
      - name: Install Playwright browsers
        run: pnpm exec playwright install chromium --with-deps
      - name: Run Browser Component Tests (Vitest + Playwright)
        run: xvfb-run --auto-servernum pnpm test:browser
        env:
          CI: "true"
      - name: Run E2E (headed via xvfb on Linux runners)
        run: pnpm test:e2e
        env:
          CI: "true"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: e2e-reports
          path: |
            playwright-report/
            test-results/
          retention-days: 7

  security:
    name: Security & Code Analysis
    runs-on: ubuntu-latest
    needs: [code-quality]
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup
      - name: Generate Test Coverage
        run: pnpm run test:coverage
      - name: Verify Coverage Report
        run: |
          if [ ! -f coverage/lcov.info ]; then
            echo "Error: coverage/lcov.info not found"
            exit 1
          fi
          echo "Coverage report found at coverage/lcov.info"
          ls -lh coverage/
      - name: Initialize CodeQL
        uses: github/codeql-action/init@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
        with:
          languages: javascript-typescript
          build-mode: none
          config-file: ./.github/codeql/codeql-config.yml
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
      - name: SonarCloud Scan
        if: env.SONAR_TOKEN != ''
        uses: sonarsource/sonarqube-scan-action@299e4b793aaa83bf2aba7c9c14bedbb485688ec4 # v7.1.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io

  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    if: always()
    needs: [code-quality, security, e2e-smoke]
    steps:
      - name: Check CI status
        run: |
          echo "code-quality: ${{ needs.code-quality.result }}"
          echo "security: ${{ needs.security.result }}"
          echo "e2e-smoke: ${{ needs.e2e-smoke.result }}"
          if [[ "${{ needs.code-quality.result }}" != "success" ]]; then exit 1; fi
          if [[ "${{ needs.security.result }}" == "failure" ]]; then echo "Security failed (non-blocking)"; fi
          if [[ "${{ needs.e2e-smoke.result }}" != "success" ]]; then exit 1; fi
          echo "All CI checks passed"
