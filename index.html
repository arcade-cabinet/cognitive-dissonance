<!doctype html>
<html lang="en" class="bg-black">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="Hold the fragile glass AI mind together as its own thoughts try to escape." />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />

    <!-- Apple Mobile Web App -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Cognitive Dissonance" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <!-- Note: Generate apple-touch-icon.png from icon.svg at 180x180px. See docs/APPLE_TOUCH_ICON.md -->

    <title>Cognitive Dissonance</title>
    <!-- Security: Content Security Policy. Babylon.js needs wasm-unsafe-eval
         for Havok physics compilation. Koota ECS uses JIT-compiled trait
         accessors (performance-critical), so unsafe-eval is required.
         Inline styles are used by Reactylon-generated canvas layout.
         Data: images are Babylon's built-in texture defaults. -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-eval' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' blob: data:; font-src 'self'; connect-src 'self'; worker-src 'self' blob:">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
